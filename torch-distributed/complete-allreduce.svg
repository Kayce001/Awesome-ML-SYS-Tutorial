<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800"><rect width="1200" height="800" fill="#fff"/><g><text x="0" y="40" font-size="24" font-weight="bold" transform="translate(50,0)">Ring All-Reduce 数据流动</text><g><text x="0" y="30" font-size="18" font-weight="bold" transform="translate(50,0) translate(0,80)">Phase 1: Scatter-reduce (分散-归约)</text><g transform="translate(50,0) translate(0,80) translate(100,50)"><circle cx="50" cy="50" r="25" fill="#4CAF50"/><circle cx="200" cy="50" r="25" fill="#4CAF50"/><circle cx="50" cy="200" r="25" fill="#4CAF50"/><circle cx="200" cy="200" r="25" fill="#4CAF50"/><path stroke="#FF5722" stroke-width="2" marker-end="url(#dataflow)" d="M75 50 L175 50"/><path stroke="#FF5722" stroke-width="2" marker-end="url(#dataflow)" d="M200 75 L200 175"/><path stroke="#FF5722" stroke-width="2" marker-end="url(#dataflow)" d="M175 200 L75 200"/><path stroke="#FF5722" stroke-width="2" marker-end="url(#dataflow)" d="M50 175 L50 75"/></g></g><g><text x="0" y="30" font-size="18" font-weight="bold" transform="translate(50,0) translate(0,400)">Phase 2: All-gather (全收集)</text><g transform="translate(50,0) translate(0,400) translate(100,50)"><circle cx="50" cy="50" r="25" fill="#4CAF50"/><circle cx="200" cy="50" r="25" fill="#4CAF50"/><circle cx="50" cy="200" r="25" fill="#4CAF50"/><circle cx="200" cy="200" r="25" fill="#4CAF50"/><path stroke="#2196F3" stroke-width="2" marker-end="url(#dataflow2)" d="M75 50 L175 50"/><path stroke="#2196F3" stroke-width="2" marker-end="url(#dataflow2)" d="M200 75 L200 175"/><path stroke="#2196F3" stroke-width="2" marker-end="url(#dataflow2)" d="M175 200 L75 200"/><path stroke="#2196F3" stroke-width="2" marker-end="url(#dataflow2)" d="M50 175 L50 75"/></g></g></g><g><text x="0" y="40" font-size="24" font-weight="bold" transform="translate(600,0)">Tree All-Reduce 数据流动</text><g transform="translate(600,0) translate(0,80)"><text x="0" y="30" font-size="18" font-weight="bold">Phase 1: Reduce (聚合)</text><circle cx="250" cy="100" r="25" fill="#2196F3"/><circle cx="150" cy="170" r="25" fill="#2196F3"/><circle cx="350" cy="170" r="25" fill="#2196F3"/><circle cx="100" cy="240" r="25" fill="#2196F3"/><circle cx="200" cy="240" r="25" fill="#2196F3"/><circle cx="300" cy="240" r="25" fill="#2196F3"/><circle cx="400" cy="240" r="25" fill="#2196F3"/><path stroke="#FF5722" stroke-width="2" marker-end="url(#dataflow)" d="M110 225 L140 185"/><path stroke="#FF5722" stroke-width="2" marker-end="url(#dataflow)" d="M190 225 L160 185"/><path stroke="#FF5722" stroke-width="2" marker-end="url(#dataflow)" d="M310 225 L340 185"/><path stroke="#FF5722" stroke-width="2" marker-end="url(#dataflow)" d="M390 225 L360 185"/><path stroke="#FF5722" stroke-width="2" marker-end="url(#dataflow)" d="M160 155 L240 115"/><path stroke="#FF5722" stroke-width="2" marker-end="url(#dataflow)" d="M340 155 L260 115"/></g><g transform="translate(600,0) translate(0,400)"><text x="0" y="30" font-size="18" font-weight="bold">Phase 2: Broadcast (广播)</text><circle cx="250" cy="100" r="25" fill="#2196F3"/><circle cx="150" cy="170" r="25" fill="#2196F3"/><circle cx="350" cy="170" r="25" fill="#2196F3"/><circle cx="100" cy="240" r="25" fill="#2196F3"/><circle cx="200" cy="240" r="25" fill="#2196F3"/><circle cx="300" cy="240" r="25" fill="#2196F3"/><circle cx="400" cy="240" r="25" fill="#2196F3"/><path stroke="#2196F3" stroke-width="2" marker-end="url(#dataflow2)" d="M240 115 L160 155"/><path stroke="#2196F3" stroke-width="2" marker-end="url(#dataflow2)" d="M260 115 L340 155"/><path stroke="#2196F3" stroke-width="2" marker-end="url(#dataflow2)" d="M140 185 L110 225"/><path stroke="#2196F3" stroke-width="2" marker-end="url(#dataflow2)" d="M160 185 L190 225"/><path stroke="#2196F3" stroke-width="2" marker-end="url(#dataflow2)" d="M340 185 L310 225"/><path stroke="#2196F3" stroke-width="2" marker-end="url(#dataflow2)" d="M360 185 L390 225"/></g></g><g><text x="0" y="0" font-size="16" font-weight="bold" transform="translate(50,750)">算法特点对比：</text><text x="20" y="30" font-size="14" transform="translate(50,750)">Ring All-Reduce: 带宽利用率均衡，适合大规模集群和大数据量，通信次数 2(N-1)</text><text x="600" y="30" font-size="14" transform="translate(50,750)">Tree All-Reduce: 延迟低，适合小规模集群，通信次数 2log₂N</text></g><defs><marker id="dataflow" markerHeight="7" markerWidth="10" orient="auto" refX="9" refY="3.5"><polygon fill="#FF5722" points="0 0 10 3.5 0 7"/></marker><marker id="dataflow2" markerHeight="7" markerWidth="10" orient="auto" refX="9" refY="3.5"><polygon fill="#2196F3" points="0 0 10 3.5 0 7"/></marker></defs></svg>